<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Treino Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .card-done { border-color: #2563eb !important; background: rgba(37, 99, 235, 0.1) !important; opacity: 0.8; }
        .hidden { display: none !important; }
        .text-accent { color: #3b82f6; }
        .bg-accent { background-color: #2563eb; }
        #sheet-descanso { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        #sheet-descanso.open { transform: translateY(0); }
        .timer-alert { animation: shake 0.5s infinite; color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        input, select, button { font-size: 16px !important; } 
    </style>
</head>
<body class="min-h-screen pb-20 overflow-x-hidden">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#020617]/95 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex flex-col">
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter" id="team-name-header">NOME <span class="text-accent">EQUIPE</span></h1>
            <div id="user-badge" class="hidden text-[9px] text-blue-400 font-bold uppercase tracking-widest mt-1"></div>
        </div>
        <div class="flex items-center gap-1">
            <button id="btn-config-trigger" class="hidden p-2 text-slate-600 hover:text-blue-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
            <button id="btn-logout-header" class="hidden p-2 text-slate-600 hover:text-red-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <section id="view-login" class="mt-12">
            <div class="text-center mb-10">
                <img id="login-logo" src="" class="h-24 w-24 rounded-3xl mx-auto mb-6 object-cover shadow-2xl bg-slate-900">
                <h2 class="text-3xl font-black text-white italic tracking-tighter uppercase leading-none" id="team-name-login">TREINADOR</h2>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-2">Plataforma de Performance</p>
            </div>
            <div class="glass-card p-8">
                <div class="space-y-4">
                    <input type="text" id="input-login" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-lg outline-none focus:border-blue-600 text-white font-bold transition-all" placeholder="Seu E-mail ou Código">
                    <button id="btn-entrar" class="w-full bg-accent text-white font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest shadow-lg shadow-blue-600/20">Entrar no Treino</button>
                </div>
            </div>
        </section>

        <section id="view-treino" class="hidden">
            <div class="flex gap-2 mb-6">
                <div class="flex-1">
                    <label class="text-[9px] uppercase font-black text-slate-600 mb-1 ml-1 block tracking-widest">Semana</label>
                    <select id="select-semana" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500"></select>
                </div>
                <div class="flex-1">
                    <label class="text-[9px] uppercase font-black text-slate-600 mb-1 ml-1 block tracking-widest">Dia</label>
                    <select id="select-dia" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500"></select>
                </div>
            </div>
            <div id="container-treino" class="space-y-5"></div>
        </section>

    </main>

    <div id="overlay-descanso" class="fixed inset-0 bg-black/70 hidden z-[60] backdrop-blur-sm transition-opacity"></div>

    <div id="sheet-descanso" class="fixed bottom-0 left-0 right-0 bg-[#0f172a] rounded-t-[40px] p-8 z-[70] border-t border-white/10 shadow-2xl">
        <div class="w-12 h-1.5 bg-slate-800 rounded-full mx-auto mb-8"></div>
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xl font-black uppercase italic tracking-tighter text-white">Descanso</h3>
            <button onclick="App.closeDescanso()" class="bg-white/5 p-2 rounded-full text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-4" id="timer-options"></div>
    </div>

    <div id="timer-display" class="fixed bottom-6 right-6 glass-card p-5 hidden z-[80] flex items-center gap-5 border-blue-500/40 shadow-2xl ring-1 ring-blue-500/20">
        <div class="flex flex-col">
            <span class="text-[8px] text-slate-500 font-black uppercase tracking-tighter" id="timer-label">Ação</span>
            <span id="timer-clock" class="font-black text-3xl tabular-nums text-blue-400 leading-none">00:00</span>
        </div>
        <button onclick="App.resetTimer()" class="bg-red-500/10 text-red-500 p-3 rounded-2xl hover:bg-red-500/20 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <div id="modal-config" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass-card p-8 w-full max-w-sm border-blue-500/30 shadow-2xl">
            <h3 class="text-blue-500 font-black text-2xl mb-2 uppercase italic tracking-tighter">Setup Adm</h3>
            <div id="config-step-1" class="space-y-4">
                <input type="text" id="admin-login-check" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-center outline-none focus:border-blue-600 text-white" placeholder="Login Admin">
                <button id="btn-verify-admin" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-600/20 uppercase tracking-widest text-xs">Validar</button>
            </div>
            <div id="config-step-2" class="hidden space-y-4">
                <input type="text" id="input-sheet-id" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-white outline-none" placeholder="ID Planilha Google">
                <button id="btn-salvar-config" class="w-full bg-accent text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Vincular</button>
            </div>
            <button id="btn-fechar-config" class="w-full py-4 text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mt-4 hover:text-white transition-colors">Voltar</button>
        </div>
    </div>

    <audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
    <script type="module" src="app.js"></script>
</body>
</html>
